version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: digital-store-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: senha-root
      MYSQL_DATABASE: nome_do_banco
      MYSQL_USER: usuario_app
      MYSQL_PASSWORD: senha_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: